server {
    listen 80;
    server_name localhost;

    # 1. Main React Website
    location / {
        proxy_pass http://client_main:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. Backend API
    location /api/ {
        # THE TRAILING SLASH IS CRITICAL HERE:
        proxy_pass http://server:3000/;  
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}