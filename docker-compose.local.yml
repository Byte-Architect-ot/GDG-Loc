# docker-compose.local.yml
# Local development MongoDB with replica set support (required for transactions)
# Usage: docker compose -f docker-compose.local.yml up -d

services:
  mongodb:
    image: mongo:7
    container_name: gdg_local_mongo
    hostname: mongodb
    ports:
      - "27017:27017"
    volumes:
      - gdg_mongo_data:/data/db
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: |
        mongosh --eval "
          try {
            rs.status();
          } catch(e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongodb:27017' }] });
          }
        " --quiet
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  gdg_mongo_data:
    driver: local
