services:
  server:
    image: ${DOCKERHUB_USERNAME}/gdg-website-server:latest
    container_name: gdg-website-server-1
    restart: always
    env_file:
      - ./Server/.env
    environment:
      - PORT=5000
    networks:
      - gdg-network

  client_admin:
    build:
      context: ./Client_admin
      dockerfile: ../Docker/dockerfile.client_admin
    container_name: gdg-website-client-admin-1
    restart: always
    env_file:
      - ./Client_admin/.env
    networks:
      - gdg-network
    depends_on:
      - server

  client_main:
    build:
      context: ./Client_main
      dockerfile: ../Docker/dockerfile.client_main
    container_name: gdg-website-client-main-1
    restart: always
    env_file:
      - ./Client_main/.env
    networks:
      - gdg-network
    depends_on:
      - server

  nginx:
    image: nginx:1.25-alpine
    container_name: gdg-website-nginx-1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./Nginx/sites:/etc/nginx/conf.d:ro
    networks:
      - gdg-network
    depends_on:
      - server
      - client_admin
      - client_main
    restart: always

networks:
  gdg-network:
    driver: bridge