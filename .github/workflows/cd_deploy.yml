name: Pulls and Deploy Docker Images

on: 
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed

jobs: 
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        env:
          # 1. Pull the secrets from GitHub into the action environment
          MONGO_URI: ${{ secrets.MONGO_URI }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # 2. Tell the SSH action to pass these specific variables to the server
          envs: MONGO_URI,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION,S3_BUCKET_NAME,DOCKERHUB_USERNAME
          script: |
            DEPLOY_DIR=~/gdg-website

            echo "Checking deployment directory..."
            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "Directory does not exist. Creating..."
              mkdir -p $DEPLOY_DIR
            fi

            cd $DEPLOY_DIR

            # 3. Dynamically create the .env file on the server using the passed variables
            echo "Creating secure .env file..."
            echo "MONGO_URI=$MONGO_URI" > .env
            echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" >> .env
            echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> .env
            echo "AWS_REGION=$AWS_REGION" >> .env
            echo "S3_BUCKET_NAME=$S3_BUCKET_NAME" >> .env
            echo "DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME" >> .env
            
            # 4. Stop running containers and clear old config files
            docker compose -f docker-compose.prod.yml down || true
            rm -f docker-compose.prod.yml
            rm -f docker-compose.certbot.yml
            rm -rf Nginx
            rm -rf tmp_repo # Ensure no old temp folder blocks the clone

            # 5. Fetch latest Nginx config and docker-compose files
            echo "Fetching Nginx and docker-compose files..."
            git clone --depth 1 https://github.com/${{ github.repository }}.git tmp_repo
            mv tmp_repo/Nginx ./Nginx
            mv tmp_repo/docker-compose.prod.yml ./
            mv tmp_repo/docker-compose.certbot.yml ./
            rm -rf tmp_repo                    
            
            # 6. Pull fresh images from DockerHub
            echo "Pulling latest images..."
            docker compose -f docker-compose.prod.yml pull

            # 7. Start the application (It will automatically read the .env file we created in step 3!)
            echo "Starting containers..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # 8. Clean up old images to save EC2 disk space
            echo "Cleaning unused images..."
            docker image prune -af

            echo "Deployment successful!"
