name: Pulls and Deploy Docker Images

on: 
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed

jobs: 
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          # We changed these three lines to match your GitHub UI exactly
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          
          script: |
            DEPLOY_DIR=~/gdg-website

            echo "Checking deployment directory..."
            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "Directory does not exist. Creating..."
              mkdir -p $DEPLOY_DIR
            fi

            cd $DEPLOY_DIR

            # 1. Export Secrets to Environment Variables
            # (Note: You still need to add these to GitHub Secrets later!)
            export MONGO_URI="${{ secrets.MONGO_URI }}"
            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            export AWS_REGION="${{ secrets.AWS_REGION }}"
            export S3_BUCKET_NAME="${{ secrets.S3_BUCKET_NAME }}"
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            
            # 2. Stop running containers and clear old config files
            docker compose -f docker-compose.prod.yml down || true
            rm -f docker-compose.prod.yml
            rm -f docker-compose.certbot.yml
            rm -rf Nginx
            rm -rf tmp_repo # Ensure no old temp folder blocks the clone

            # 3. Fetch latest Nginx config and docker-compose files
            echo "Fetching Nginx and docker-compose files..."
            git clone --depth 1 https://github.com/${{ github.repository }}.git tmp_repo
            mv tmp_repo/Nginx ./Nginx
            mv tmp_repo/docker-compose.prod.yml ./
            mv tmp_repo/docker-compose.certbot.yml ./
            rm -rf tmp_repo                    
            
            # 4. Pull fresh images from DockerHub
            echo "Pulling latest images..."
            docker compose -f docker-compose.prod.yml pull

            # 5. Start the application
            echo "Starting containers..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # 6. Clean up old images to save EC2 disk space
            echo "Cleaning unused images..."
            docker image prune -af

            echo "Deployment successful!"
